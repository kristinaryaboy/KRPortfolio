<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="50%" stop-color="#E91E79"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E91E79" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6C5CE7" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.5"/>

  <!-- Inner ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="url(#grad2)" stroke-width="1" opacity="0.3"/>

  <!-- K letterform -->
  <g filter="url(#glow)">
    <!-- K vertical stroke -->
    <path d="M 58 52 L 58 148" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round" fill="none"/>
    <!-- K diagonal strokes -->
    <path d="M 62 100 L 98 52" stroke="url(#grad1)" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M 68 106 L 100 148" stroke="url(#grad1)" stroke-width="7" stroke-linecap="round" fill="none"/>
  </g>

  <!-- R letterform -->
  <g filter="url(#glow)">
    <!-- R vertical stroke -->
    <path d="M 108 52 L 108 148" stroke="#E91E79" stroke-width="8" stroke-linecap="round" fill="none"/>
    <!-- R bowl -->
    <path d="M 108 52 L 130 52 Q 152 52 152 76 Q 152 100 130 100 L 108 100" stroke="#E91E79" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- R leg -->
    <path d="M 124 100 L 150 148" stroke="#E91E79" stroke-width="7" stroke-linecap="round" fill="none"/>
  </g>
</svg>