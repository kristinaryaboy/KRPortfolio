<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" fill="none">
  <defs>
    <linearGradient id="edgeGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E91E79" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E91E79" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- K letterform — clean geometric strokes -->
  <path d="M24 20 L24 140" stroke="#D9E1E8" stroke-width="6" stroke-linecap="square"/>
  <path d="M30 80 L84 20" stroke="#D9E1E8" stroke-width="5" stroke-linecap="square"/>
  <path d="M30 80 L88 140" stroke="#D9E1E8" stroke-width="5" stroke-linecap="square"/>

  <!-- R letterform — sharing vertical space with K -->
  <path d="M112 20 L112 140" stroke="#D9E1E8" stroke-width="6" stroke-linecap="square"/>
  <path d="M112 20 L160 20 Q184 20 184 46 Q184 72 160 72 L112 72" stroke="#D9E1E8" stroke-width="5" stroke-linecap="square" fill="none"/>
  <path d="M148 72 L192 140" stroke="#D9E1E8" stroke-width="5" stroke-linecap="square"/>

  <!-- Magenta accent — diagonal slash connecting K to R -->
  <path d="M88 140 L112 140" stroke="#E91E79" stroke-width="2.5" stroke-linecap="square"/>

  <!-- Magenta accent — subtle highlight on R leg -->
  <path d="M172 110 L192 140" stroke="#E91E79" stroke-width="2" stroke-linecap="square" opacity="0.7"/>

  <!-- Subtle underline accent -->
  <line x1="24" y1="152" x2="192" y2="152" stroke="url(#edgeGlow)" stroke-width="1"/>
</svg>
