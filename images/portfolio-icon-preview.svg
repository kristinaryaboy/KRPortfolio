<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="portfolioGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e91e8c" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#e91e8c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e91e8c" stop-opacity="0"/>
    </radialGradient>
    <filter id="portfolioBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="300" height="300" fill="transparent"/>
  <!-- Ambient glow -->
  <circle cx="150" cy="145" r="80" fill="url(#portfolioGlow)" filter="url(#portfolioBlur)" opacity="0.4"/>

  <!-- Open notebook — left page -->
  <g>
    <rect x="50" y="85" width="97" height="130" rx="2" fill="#263848" stroke="rgba(217,225,232,0.08)" stroke-width="0.5"/>
    <rect x="60" y="96" width="34" height="22" rx="1" stroke="rgba(233,30,140,0.3)" stroke-width="0.8" fill="rgba(233,30,140,0.04)"/>
    <rect x="100" y="96" width="38" height="9" rx="1" stroke="rgba(217,225,232,0.08)" stroke-width="0.5" fill="none"/>
    <rect x="100" y="109" width="38" height="9" rx="1" stroke="rgba(217,225,232,0.08)" stroke-width="0.5" fill="none"/>
    <line x1="60" y1="130" x2="136" y2="130" stroke="rgba(217,225,232,0.06)" stroke-width="0.5"/>
    <line x1="60" y1="140" x2="136" y2="140" stroke="rgba(217,225,232,0.06)" stroke-width="0.5"/>
    <line x1="60" y1="150" x2="130" y2="150" stroke="rgba(217,225,232,0.06)" stroke-width="0.5"/>
    <line x1="60" y1="160" x2="120" y2="160" stroke="rgba(217,225,232,0.06)" stroke-width="0.5"/>
    <rect x="60" y="175" width="18" height="3" rx="1" fill="#e91e8c" opacity="0.2"/>
    <rect x="82" y="175" width="30" height="3" rx="1" fill="rgba(217,225,232,0.06)"/>
  </g>

  <!-- Open notebook — right page -->
  <g>
    <rect x="153" y="85" width="97" height="130" rx="2" fill="#2c4456" stroke="rgba(217,225,232,0.08)" stroke-width="0.5"/>
    <rect x="163" y="96" width="36" height="36" rx="2" fill="#1c2b36" stroke="rgba(217,225,232,0.06)" stroke-width="0.5"/>
    <rect x="204" y="96" width="36" height="36" rx="2" fill="#c41a78" opacity="0.15" stroke="rgba(233,30,140,0.15)" stroke-width="0.5"/>
    <rect x="163" y="138" width="36" height="36" rx="2" fill="#334c64" stroke="rgba(217,225,232,0.06)" stroke-width="0.5"/>
    <rect x="204" y="138" width="36" height="36" rx="2" fill="#1c2b36" stroke="rgba(217,225,232,0.06)" stroke-width="0.5"/>
    <rect x="172" y="101" width="12" height="22" rx="2" stroke="rgba(233,30,140,0.3)" stroke-width="0.6" fill="rgba(233,30,140,0.05)"/>
    <circle cx="178" cy="115" r="1.5" fill="#e91e8c" opacity="0.25"/>
    <circle cx="222" cy="156" r="8" stroke="rgba(217,225,232,0.1)" stroke-width="0.5" fill="none"/>
    <circle cx="222" cy="156" r="3" fill="#e91e8c" opacity="0.12"/>
    <rect x="163" y="182" width="77" height="4" rx="2" fill="rgba(217,225,232,0.04)"/>
    <rect x="163" y="182" width="24" height="4" rx="2" fill="#e91e8c" opacity="0.15"/>
  </g>

  <!-- Notebook spine -->
  <line x1="150" y1="83" x2="150" y2="217" stroke="rgba(217,225,232,0.12)" stroke-width="1.5"/>
  <line x1="149" y1="95" x2="151" y2="95" stroke="rgba(217,225,232,0.08)" stroke-width="0.5"/>
  <line x1="149" y1="115" x2="151" y2="115" stroke="rgba(217,225,232,0.08)" stroke-width="0.5"/>
  <line x1="149" y1="135" x2="151" y2="135" stroke="rgba(217,225,232,0.08)" stroke-width="0.5"/>
  <line x1="149" y1="155" x2="151" y2="155" stroke="rgba(217,225,232,0.08)" stroke-width="0.5"/>
  <line x1="149" y1="175" x2="151" y2="175" stroke="rgba(217,225,232,0.08)" stroke-width="0.5"/>
  <line x1="149" y1="195" x2="151" y2="195" stroke="rgba(217,225,232,0.08)" stroke-width="0.5"/>

  <!-- Pen -->
  <g>
    <animateTransform attributeName="transform" type="rotate" values="-1.5,238,248;1.5,238,248;-1.5,238,248" dur="2.5s" repeatCount="indefinite"/>
    <line x1="210" y1="232" x2="268" y2="262" stroke="#3a5068" stroke-width="3" stroke-linecap="round"/>
    <line x1="210" y1="232" x2="216" y2="235" stroke="#e91e8c" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <circle cx="208" cy="231" r="1.2" fill="rgba(217,225,232,0.35)"/>
  </g>

  <!-- Pencil -->
  <line x1="22" y1="72" x2="85" y2="48" stroke="#c8a06a" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="22" y1="72" x2="18" y2="74" stroke="rgba(217,225,232,0.25)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="87" cy="47" r="2.5" fill="#e91e8c" opacity="0.18"/>

  <!-- Color swatch strip -->
  <g transform="translate(30, 238)">
    <rect x="0" y="0" width="70" height="16" rx="4" fill="#1c2b36" stroke="rgba(217,225,232,0.06)" stroke-width="0.5"/>
    <circle cx="12" cy="8" r="4.5" fill="#e91e8c" opacity="0.45"/>
    <circle cx="26" cy="8" r="4.5" fill="#334c64" opacity="0.6"/>
    <circle cx="40" cy="8" r="4.5" fill="#c8a06a" opacity="0.3"/>
    <circle cx="54" cy="8" r="4.5" fill="#2a4054" opacity="0.6"/>
  </g>

  <!-- Sticky note -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-1.5;0,0" dur="3.5s" repeatCount="indefinite"/>
    <rect x="222" y="56" width="48" height="42" rx="1" fill="#c8a06a" opacity="0.1" stroke="rgba(200,160,106,0.12)" stroke-width="0.5"/>
    <path d="M260,56 L270,56 L270,66 Z" fill="#c8a06a" opacity="0.06"/>
    <line x1="230" y1="68" x2="260" y2="68" stroke="rgba(200,160,106,0.1)" stroke-width="0.5"/>
    <line x1="230" y1="76" x2="256" y2="76" stroke="rgba(200,160,106,0.1)" stroke-width="0.5"/>
    <line x1="230" y1="84" x2="248" y2="84" stroke="rgba(200,160,106,0.1)" stroke-width="0.5"/>
  </g>

  <!-- Coffee cup -->
  <circle cx="40" cy="42" r="13" fill="none" stroke="rgba(217,225,232,0.1)" stroke-width="1.5"/>
  <circle cx="40" cy="42" r="9" fill="#1c2b36" stroke="rgba(217,225,232,0.05)" stroke-width="0.5"/>
  <circle cx="40" cy="42" r="5" fill="#2a1520" opacity="0.4"/>
  <path d="M53,38 Q60,42 53,46" fill="none" stroke="rgba(217,225,232,0.08)" stroke-width="1"/>
  <path d="M36,28 Q34,22 37,16" fill="none" stroke="rgba(217,225,232,0.06)" stroke-width="0.5">
    <animate attributeName="opacity" values="0.04;0.1;0.04" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M42,26 Q44,20 41,14" fill="none" stroke="rgba(217,225,232,0.06)" stroke-width="0.5">
    <animate attributeName="opacity" values="0.04;0.1;0.04" dur="3s" repeatCount="indefinite"/>
  </path>

  <!-- Phone -->
  <rect x="266" y="140" width="20" height="38" rx="3" fill="#1c2b36" stroke="rgba(217,225,232,0.08)" stroke-width="0.5"/>
  <rect x="268" y="144" width="16" height="28" rx="1" fill="#16222B"/>
  <circle cx="276" cy="157" r="1.5" fill="#e91e8c" opacity="0.12"/>

  <!-- Floating particles -->
  <circle cx="130" cy="35" r="1.2" fill="#e91e8c" opacity="0.15">
    <animate attributeName="opacity" values="0.1;0.25;0.1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="275" cy="105" r="1" fill="rgba(217,225,232,0.15)">
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="15" cy="180" r="1.2" fill="#e91e8c" opacity="0.1">
    <animate attributeName="opacity" values="0.08;0.2;0.08" dur="3.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="285" cy="230" r="1" fill="rgba(217,225,232,0.12)">
    <animate attributeName="opacity" values="0.08;0.18;0.08" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
