<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, sans-serif; }
      .label { fill: #c8c8c8; font-size: 13px; }
      .label-sm { fill: #999; font-size: 11px; }
      .heading { fill: #e8e8e8; font-size: 16px; font-weight: 600; }
      .heading-lg { fill: #fff; font-size: 20px; font-weight: 600; }
      .accent { fill: #E8711A; }
      .accent-text { fill: #E8711A; font-size: 12px; font-weight: 600; }
      .nav-text { fill: #888; font-size: 10px; }
      .nav-active { fill: #E8711A; font-size: 10px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" rx="40" fill="#1A1A2E"/>

  <!-- Status bar area -->
  <rect x="0" y="0" width="375" height="48" fill="none"/>

  <!-- Greeting area -->
  <text x="24" y="80" class="heading-lg">Good evening,</text>
  <text x="24" y="104" class="label">Client</text>

  <!-- Avatar circle -->
  <circle cx="340" cy="82" r="22" fill="none" stroke="#E8711A" stroke-width="2"/>
  <text x="340" y="88" text-anchor="middle" fill="#E8711A" font-size="14" font-weight="600">IR</text>

  <!-- Today Card -->
  <rect x="24" y="128" width="327" height="72" rx="12" fill="#2A2A3E"/>
  <rect x="24" y="128" width="3" height="72" rx="1.5" fill="#E8711A"/>
  <text x="40" y="152" fill="#E8711A" font-size="11" font-weight="600" letter-spacing="1">TODAY</text>
  <text x="40" y="172" class="heading">No sessions today</text>
  <text x="40" y="190" fill="#E8711A" font-size="13">Book one →</text>
  <!-- Flame icon placeholder -->
  <circle cx="320" cy="164" r="14" fill="none" stroke="#E8711A" stroke-width="1.5" opacity="0.5"/>

  <!-- Quick Actions Section -->
  <rect x="24" y="220" width="3" height="18" rx="1.5" fill="#E8711A"/>
  <text x="36" y="235" class="heading">Quick Actions</text>

  <!-- Quick Action Cards -->
  <rect x="24" y="252" width="74" height="74" rx="12" fill="#2A2A3E"/>
  <rect x="42" y="268" width="38" height="24" rx="4" fill="none" stroke="#E8711A" stroke-width="1.5" opacity="0.6"/>
  <text x="61" y="316" text-anchor="middle" class="label-sm">Workouts</text>

  <rect x="108" y="252" width="74" height="74" rx="12" fill="#2A2A3E"/>
  <rect x="126" y="268" width="38" height="24" rx="4" fill="none" stroke="#E8711A" stroke-width="1.5" opacity="0.6"/>
  <text x="145" y="316" text-anchor="middle" class="label-sm">Book</text>

  <rect x="192" y="252" width="74" height="74" rx="12" fill="#2A2A3E"/>
  <rect x="210" y="268" width="38" height="24" rx="4" fill="none" stroke="#E8711A" stroke-width="1.5" opacity="0.6"/>
  <text x="229" y="316" text-anchor="middle" class="label-sm">Progress</text>

  <rect x="276" y="252" width="74" height="74" rx="12" fill="#2A2A3E"/>
  <rect x="294" y="268" width="38" height="24" rx="4" fill="none" stroke="#E8711A" stroke-width="1.5" opacity="0.6"/>
  <text x="313" y="316" text-anchor="middle" class="label-sm">Chat</text>

  <!-- Start Your Journey -->
  <circle cx="64" cy="400" r="32" fill="#2A2A3E"/>
  <circle cx="64" cy="400" r="14" fill="none" stroke="#E8711A" stroke-width="1.5" opacity="0.5"/>

  <text x="187" y="460" text-anchor="middle" class="heading">Start Your Journey</text>
  <text x="187" y="482" text-anchor="middle" class="label-sm">Set goals, book sessions, and track your progress.</text>

  <!-- Browse Workouts CTA -->
  <rect x="24" y="504" width="327" height="48" rx="24" fill="#E8711A"/>
  <text x="187" y="534" text-anchor="middle" fill="#1A1A2E" font-size="15" font-weight="600">Browse Workouts</text>

  <!-- Bottom Nav Bar -->
  <rect x="0" y="748" width="375" height="64" fill="#111122"/>
  <line x1="0" y1="748" x2="375" y2="748" stroke="#2A2A3E" stroke-width="1"/>

  <!-- Home (active) -->
  <rect x="24" y="758" width="30" height="20" rx="4" fill="none" stroke="#E8711A" stroke-width="1.5"/>
  <text x="39" y="792" text-anchor="middle" class="nav-active">Home</text>

  <!-- Workouts -->
  <rect x="96" y="758" width="30" height="20" rx="4" fill="none" stroke="#555" stroke-width="1"/>
  <text x="111" y="792" text-anchor="middle" class="nav-text">Workouts</text>

  <!-- Schedule -->
  <rect x="171" y="758" width="30" height="20" rx="4" fill="none" stroke="#555" stroke-width="1"/>
  <text x="186" y="792" text-anchor="middle" class="nav-text">Schedule</text>

  <!-- Progress -->
  <rect x="246" y="758" width="30" height="20" rx="4" fill="none" stroke="#555" stroke-width="1"/>
  <text x="261" y="792" text-anchor="middle" class="nav-text">Progress</text>

  <!-- Profile -->
  <circle cx="333" cy="768" r="10" fill="none" stroke="#555" stroke-width="1"/>
  <text x="333" y="792" text-anchor="middle" class="nav-text">Profile</text>
</svg>
