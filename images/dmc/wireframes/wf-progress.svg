<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <defs>
    <style>
      text { font-family: 'Segoe UI', system-ui, sans-serif; }
      .label { fill: #c8c8c8; font-size: 13px; }
      .label-sm { fill: #999; font-size: 11px; }
      .heading { fill: #e8e8e8; font-size: 16px; font-weight: 600; }
      .heading-lg { fill: #fff; font-size: 20px; font-weight: 700; }
      .stat-value { fill: #fff; font-size: 28px; font-weight: 700; }
      .stat-label { fill: #999; font-size: 11px; }
      .nav-text { fill: #888; font-size: 10px; }
      .nav-active { fill: #E8711A; font-size: 10px; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="375" height="812" rx="40" fill="#1A1A2E"/>

  <!-- Page Title -->
  <text x="24" y="76" class="heading-lg">Progress</text>

  <!-- Stats Cards -->
  <rect x="24" y="96" width="155" height="80" rx="12" fill="#2A2A3E"/>
  <text x="40" y="118" class="label-sm">Weight</text>
  <text x="40" y="150" class="stat-value">150.0</text>
  <text x="132" y="150" class="stat-label">lbs</text>

  <rect x="195" y="96" width="155" height="80" rx="12" fill="#2A2A3E"/>
  <text x="211" y="118" class="label-sm">Body Fat</text>
  <text x="211" y="150" class="stat-value">1.0</text>
  <text x="260" y="150" class="stat-label">%</text>

  <!-- Log Measurement CTA -->
  <rect x="24" y="196" width="327" height="44" rx="22" fill="#E8711A"/>
  <text x="187" y="224" text-anchor="middle" fill="#1A1A2E" font-size="14" font-weight="600">⊕ Log Measurement</text>

  <!-- Category tabs -->
  <rect x="24" y="264" width="74" height="74" rx="12" fill="#2A2A3E"/>
  <rect x="40" y="278" width="42" height="28" rx="4" fill="none" stroke="#E8711A" stroke-width="1.5" opacity="0.5"/>
  <text x="61" y="326" text-anchor="middle" class="label-sm">Photos</text>

  <rect x="112" y="264" width="74" height="74" rx="12" fill="#2A2A3E"/>
  <rect x="128" y="278" width="42" height="28" rx="4" fill="none" stroke="#5C6BC0" stroke-width="1.5" opacity="0.5"/>
  <text x="149" y="326" text-anchor="middle" class="label-sm">PRs</text>

  <rect x="200" y="264" width="74" height="74" rx="12" fill="#2A2A3E"/>
  <rect x="216" y="278" width="42" height="28" rx="4" fill="none" stroke="#5C6BC0" stroke-width="1.5" opacity="0.5"/>
  <text x="237" y="326" text-anchor="middle" class="label-sm">Goals</text>

  <!-- Active Goals -->
  <rect x="24" y="368" width="3" height="18" rx="1.5" fill="#E8711A"/>
  <text x="36" y="383" class="heading">Active Goals</text>
  <text x="351" y="383" text-anchor="end" fill="#E8711A" font-size="13">See All</text>

  <!-- Empty state -->
  <circle cx="187" cy="480" r="32" fill="#2A2A3E"/>
  <rect x="174" y="470" width="26" height="20" rx="3" fill="none" stroke="#E8711A" stroke-width="1.5" opacity="0.5"/>

  <text x="187" y="536" text-anchor="middle" class="heading" font-size="15">No Active Goals</text>
  <text x="187" y="558" text-anchor="middle" class="label-sm">Set a goal to track your progress.</text>

  <!-- Set a Goal CTA -->
  <rect x="24" y="580" width="327" height="48" rx="24" fill="#E8711A"/>
  <text x="187" y="610" text-anchor="middle" fill="#1A1A2E" font-size="15" font-weight="600">Set a Goal</text>

  <!-- Bottom Nav Bar -->
  <rect x="0" y="748" width="375" height="64" fill="#111122"/>
  <line x1="0" y1="748" x2="375" y2="748" stroke="#2A2A3E" stroke-width="1"/>

  <!-- Home -->
  <rect x="24" y="758" width="30" height="20" rx="4" fill="none" stroke="#555" stroke-width="1"/>
  <text x="39" y="792" text-anchor="middle" class="nav-text">Home</text>

  <!-- Workouts -->
  <rect x="96" y="758" width="30" height="20" rx="4" fill="none" stroke="#555" stroke-width="1"/>
  <text x="111" y="792" text-anchor="middle" class="nav-text">Workouts</text>

  <!-- Schedule -->
  <rect x="171" y="758" width="30" height="20" rx="4" fill="none" stroke="#555" stroke-width="1"/>
  <text x="186" y="792" text-anchor="middle" class="nav-text">Schedule</text>

  <!-- Progress (active) -->
  <rect x="246" y="758" width="30" height="20" rx="4" fill="none" stroke="#E8711A" stroke-width="1.5"/>
  <text x="261" y="792" text-anchor="middle" class="nav-active">Progress</text>

  <!-- Profile -->
  <circle cx="333" cy="768" r="10" fill="none" stroke="#555" stroke-width="1"/>
  <text x="333" y="792" text-anchor="middle" class="nav-text">Profile</text>
</svg>
