<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Kristina Ryaboy</title>
  <link rel="icon" type="image/png" href="images/Logo2.png">
  <link rel="apple-touch-icon" href="images/Logo2.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Josefin+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1e2a34;
      color: rgba(217, 225, 232, 0.7);
      font-family: 'Inter', sans-serif;
      text-align: center;
      padding: 32px;
    }

    .error-logo {
      width: 80px;
      height: auto;
      margin-bottom: 32px;
      opacity: 0.8;
    }

    .error-code {
      font-family: 'Inter', sans-serif;
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 300;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, rgba(217, 225, 232, 0.6), #e91e8c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 16px;
    }

    .error-title {
      font-family: 'Josefin Sans', sans-serif;
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 400;
      color: rgba(217, 225, 232, 0.5);
      margin-bottom: 12px;
      letter-spacing: 0.04em;
    }

    .error-message {
      font-size: 0.95rem;
      line-height: 1.6;
      max-width: 400px;
      margin-bottom: 40px;
      color: rgba(217, 225, 232, 0.4);
    }

    .error-link {
      display: inline-block;
      padding: 12px 32px;
      border: 1px solid rgba(233, 30, 121, 0.4);
      border-radius: 6px;
      color: #e91e8c;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      transition: all 0.3s ease;
    }

    .error-link:hover {
      background: rgba(233, 30, 121, 0.08);
      border-color: #e91e8c;
      box-shadow: 0 0 20px rgba(233, 30, 121, 0.1);
    }

    .error-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #e91e8c, transparent);
      opacity: 0.4;
      margin: 0 auto 32px;
    }

    /* Subtle floating animation */
    .error-logo {
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* Last 4 falls off */
    .error-code {
      position: relative;
    }

    .error-code span {
      display: inline-block;
    }

    .error-code__fallen {
      animation: fallOff 1.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 1.2s;
      transform-origin: bottom left;
      /* Own gradient matching the parent so it stays visible when rotated */
      background: linear-gradient(135deg, rgba(217, 225, 232, 0.6), #e91e8c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @keyframes fallOff {
      0% { transform: rotate(0deg) translateY(0); }
      20% { transform: rotate(6deg) translateY(0); }
      35% { transform: rotate(-3deg) translateY(0); }
      50% { transform: rotate(15deg) translateY(0); }
      70% { transform: rotate(55deg) translateY(0); }
      85% { transform: rotate(85deg) translateY(0); }
      92% { transform: rotate(92deg) translateY(0); }
      100% { transform: rotate(90deg) translateY(0); }
    }

    /* Oops bubble */
    .error-oops {
      position: absolute;
      right: -48px;
      bottom: -8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      font-style: italic;
      color: rgba(233, 30, 121, 0.6);
      opacity: 0;
      animation: oopsAppear 0.4s ease forwards;
      animation-delay: 3s;
      letter-spacing: 0;
      -webkit-text-fill-color: rgba(233, 30, 121, 0.6);
    }

    @keyframes oopsAppear {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <img src="images/Logo2.png" alt="KR" class="error-logo">
  <div class="error-code"><span>4</span><span>0</span><span class="error-code__fallen">4</span><span class="error-oops">oops</span></div>
  <h1 class="error-title">Page Not Found</h1>
  <div class="error-divider"></div>
  <p class="error-message">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <a href="index.html" class="error-link">Back to Portfolio</a>
</body>
</html>
